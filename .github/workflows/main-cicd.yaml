name: CI + CD

on:
  push:
    tags:
      - 'v*'      # Triggers on any tag starting with 'v' (e.g., v1.0.0)
  workflow_dispatch: # Keeps manual trigger capability

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures tags are available

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Prepare build directory
        run: |
          rm -rf build-output
          mkdir build-output
          # Note: Ensure .next/standalone is included if using standalone output
          cp -R public package.json next.config.js acquia_config.yaml node_modules build-output/
          # If using Next.js default build, you likely need the .next folder:
          # cp -R .next build-output/

      - name: Set up SSH for SVN
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H svn-1565.gardens.hosting.acquia.com >> ~/.ssh/known_hosts

      - name: Commit and Push Tag
        run: |
          # Get the tag name from the GitHub Ref (e.g., refs/tags/v1.0.0 -> v1.0.0)
          TAG_NAME=${GITHUB_REF#refs/tags/}
          
          cd build-output
          git init
          git config user.name "gatij"
          git config user.email "gatij.jain@acquia.com"
          git remote add target nodejsacn@svn-1565.gardens.hosting.acquia.com:nodejsacn.git
          
          # We create a detached head commit of the build artifacts
          git add .
          git commit -m "Build output for $TAG_NAME"
          
          # Create a tag on the new commit and push it to the target
          git tag $TAG_NAME
          git push --force target $TAG_NAME

      - name: Trigger deployment
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          # Pass the tag name to the --branch parameter as Acquia API usually treats them interchangeably
          ./deploy.sh --client-id=${{ secrets.CLIENT_ID }} \
                      --client-secret=${{ secrets.CLIENT_SECRET }} \
                      --environment-id=32846-650d343b-a0f4-46ca-9001-0fc7f8acebe7 \
                      --branch="tags/$TAG_NAME"
